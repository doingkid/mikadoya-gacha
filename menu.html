<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メニュー | ミカドガチャ</title>
  <style>
    :root {
      --bg:    #f6f0e4;
      --red:   #c0392b;
      --ink:   #1a1a1a;
      --brown: #7a5230;
      --green: #5a7a3a;
      --line:  #c8bfac;
      --font-h: "Yuji Syuku", "ヒラギノ明朝 ProN", "Hiragino Mincho ProN", Georgia, serif;
      --font-b: system-ui, -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
      --w: 480px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-b);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header, .main, .footer {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .header-inner, .main-inner, .footer-inner {
      width: 100%;
      max-width: var(--w);
    }

    .main { flex: 1; }
    .main-inner { padding: 24px 16px 48px; }

    /* ヘッダー */
    .header { background: var(--red); color: #fff; }

    .header-inner { padding: 14px 16px 0; }

    .back-link {
      display: inline-block;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.82rem;
      margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .back-link:hover { color: #fff; }

    .page-title {
      font-family: var(--font-h);
      font-size: 1.5rem;
      letter-spacing: 0.15em;
    }

    .page-sub {
      font-size: 0.72rem;
      opacity: 0.75;
      margin-top: 4px;
    }

    .header-noren {
      display: flex;
      margin-top: 14px;
      gap: 3px;
      padding: 0 8px;
      justify-content: center;
    }

    .noren-strip {
      flex: 1;
      max-width: 40px;
      height: 22px;
      background: rgba(0,0,0,0.18);
      border-radius: 0 0 11px 11px;
    }

    /* セクション */
    .section { margin-bottom: 36px; }

    .section-heading {
      font-family: var(--font-h);
      font-size: 1rem;
      color: var(--brown);
      letter-spacing: 0.12em;
      border-bottom: 2px solid var(--brown);
      padding-bottom: 6px;
      margin-bottom: 16px;
    }

    .cat-block { margin-bottom: 20px; }

    .cat-label {
      font-family: var(--font-h);
      font-size: 0.8rem;
      color: var(--green);
      border-bottom: 1px solid var(--green);
      padding-bottom: 2px;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }

    /* 品目行 */
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 7px 0;
      font-size: 0.85rem;
      border-bottom: 1px dotted var(--line);
    }

    .menu-item:last-child { border-bottom: none; }

    .item-name { line-height: 1.4; }

    .item-right {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .item-kcal { font-size: 0.72rem; color: #aaa; }

    .item-price {
      color: var(--red);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    /* フッター */
    .footer { background: var(--ink); color: #c8bfac; margin-top: auto; }

    .footer-inner { padding: 16px; font-size: 0.75rem; line-height: 1.9; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="./" class="back-link">← ガチャに戻る</a>
    <h1 class="page-title">メニュー</h1>
    <p class="page-sub">酒場ミカドヤ</p>
    <div class="header-noren" aria-hidden="true">
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="main-inner" id="main-inner">
    <p style="color:#888;font-size:0.85rem;">読み込み中…</p>
  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <p>※価格は税込。ドリンク・お通し（チャージ）代は別途。</p>
    <p>本サービスはファンによる非公式サイトです。</p>
  </div>
</footer>

<script>
  'use strict';

  const DRINK_TAG_LABELS = {
    beer:     'ビール・発泡系',
    whisky:   'ウイスキー',
    sour:     'サワー',
    shochu:   '焼酎',
    cocktail: 'カクテル・リキュール',
    sake:     '日本酒',
    soft:     'ソフトドリンク',
  };
  const DRINK_TAG_ORDER = ['beer', 'whisky', 'sour', 'shochu', 'cocktail', 'sake', 'soft'];

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function yen(n) { return n.toLocaleString('ja-JP') + '円'; }

  function itemRow(item) {
    const kcal = item.kcal != null
      ? `<span class="item-kcal">約${item.kcal}kcal</span>`
      : '';
    return `<div class="menu-item">
      <span class="item-name">${esc(item.name)}</span>
      <span class="item-right">${kcal}<span class="item-price">${esc(yen(item.price))}</span></span>
    </div>`;
  }

  async function loadMenu() {
    for (const src of ['./menu.json', './menu.sample.json']) {
      try {
        const res = await fetch(src);
        if (!res.ok) continue;
        const data = await res.json();
        if (data && Array.isArray(data.categories) && Array.isArray(data.items)) return data;
      } catch (_) {}
    }
    return null;
  }

  function render(data) {
    const container = document.getElementById('main-inner');
    container.innerHTML = '';

    // ── 食べ物 ──
    const foodSec = document.createElement('div');
    foodSec.className = 'section';
    foodSec.innerHTML = '<h2 class="section-heading">食べ物</h2>';

    const foodCats = data.categories
      .filter(c => c.kind === 'food')
      .sort((a, b) => a.order - b.order);

    for (const cat of foodCats) {
      const items = data.items.filter(
        i => i.category === cat.id && i.available !== false
      );
      if (!items.length) continue;
      const block = document.createElement('div');
      block.className = 'cat-block';
      block.innerHTML = `<p class="cat-label">${esc(cat.label)}</p>` + items.map(itemRow).join('');
      foodSec.appendChild(block);
    }
    container.appendChild(foodSec);

    // ── ドリンク ──
    const drinkSec = document.createElement('div');
    drinkSec.className = 'section';
    drinkSec.innerHTML = '<h2 class="section-heading">ドリンク</h2>';

    const drinkItems = data.items.filter(i => {
      const cat = data.categories.find(c => c.id === i.category);
      return cat && cat.kind === 'drink' && i.available !== false;
    });

    for (const tag of DRINK_TAG_ORDER) {
      const items = drinkItems.filter(i => Array.isArray(i.tags) && i.tags.includes(tag));
      if (!items.length) continue;
      const block = document.createElement('div');
      block.className = 'cat-block';
      block.innerHTML = `<p class="cat-label">${esc(DRINK_TAG_LABELS[tag])}</p>` + items.map(itemRow).join('');
      drinkSec.appendChild(block);
    }
    container.appendChild(drinkSec);
  }

  loadMenu().then(data => {
    if (!data) {
      document.getElementById('main-inner').innerHTML =
        '<p style="color:#c0392b;font-size:0.9rem;">メニューの読み込みに失敗しました。</p>';
      return;
    }
    render(data);
  });
</script>
</body>
</html>
