<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミカドガチャ</title>
  <style>
    /* ===== CSS 変数 ===== */
    :root {
      --bg:       #f6f0e4;
      --red:      #c0392b;
      --red-dark: #8c2820;
      --ink:      #1a1a1a;
      --brown:    #7a5230;
      --green:    #5a7a3a;
      --card:     #faf7f0;
      --line:     #c8bfac;
      --font-h:   "Yuji Syuku", "ヒラギノ明朝 ProN", "Hiragino Mincho ProN", Georgia, serif;
      --font-b:   system-ui, -apple-system, "Hiragino Sans", "Meiryo", sans-serif;
      --r:        6px;
      --w:        480px;
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-b);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ===== レイアウト ===== */
    .header, .main, .footer {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .header-inner, .main-inner, .footer-inner {
      width: 100%;
      max-width: var(--w);
    }

    .main { flex: 1; }
    .main-inner { padding: 24px 16px 32px; }

    /* ===== ヘッダー（のれん風） ===== */
    .header {
      background: var(--red);
      color: #fff;
      position: relative;
    }

    .header-inner {
      padding: 20px 16px 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      width: fit-content;
      margin: 0 auto;
    }

    .header-kanban {
      display: block;
      width: auto;
      height: 52px;
      object-fit: contain;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.45));
      flex-shrink: 0;
    }

    .header-title {
      font-family: var(--font-h);
      font-size: clamp(1.4rem, 5.5vw, 1.8rem);
      letter-spacing: 0.15em;
      line-height: 1.2;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    .header-sub {
      font-size: 0.72rem;
      opacity: 0.75;
      margin-top: 5px;
      letter-spacing: 0.05em;
    }

    /* のれん下部ストライプ */
    .header-noren {
      display: flex;
      margin-top: 16px;
      gap: 3px;
      padding: 0 8px;
      justify-content: center;
    }

    .noren-strip {
      flex: 1;
      max-width: 40px;
      height: 28px;
      background: rgba(0,0,0,0.18);
      border-radius: 0 0 14px 14px;
    }

    /* ===== コントロールカード（予算＋フィルター） ===== */
    .control-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .budget-row {
      display: flex;
      gap: 8px;
    }

    .seg-btn {
      flex: 1;
      padding: 11px 8px;
      font-family: var(--font-b);
      font-size: 0.95rem;
      font-weight: 700;
      color: #aaa;
      background: var(--bg);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .seg-btn[aria-checked="true"] {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .seg-btn:focus-visible {
      outline: 3px solid var(--brown);
      outline-offset: -3px;
    }

    /* ===== ガチャボタン ===== */
    .gacha-section { margin-bottom: 20px; }

    .gacha-btn {
      display: block;
      width: 100%;
      min-height: 60px;
      padding: 12px 16px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-family: var(--font-h);
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 5px 0 var(--red-dark);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .gacha-btn:not(:disabled):active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 var(--red-dark);
    }

    .gacha-btn:disabled {
      background: #b0a090;
      box-shadow: 0 5px 0 #887060;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .gacha-btn:focus-visible {
      outline: 3px solid var(--brown);
      outline-offset: 3px;
    }

    .gacha-btn.is-spinning {
      animation: karakara 0.4s ease-in-out;
    }

    @keyframes karakara {
      0%   { transform: translateX(0)   rotate(0deg); }
      20%  { transform: translateX(-7px) rotate(-2deg); }
      40%  { transform: translateX(7px)  rotate(2deg); }
      60%  { transform: translateX(-5px) rotate(-1deg); }
      80%  { transform: translateX(5px)  rotate(1deg); }
      100% { transform: translateX(0)   rotate(0deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .gacha-btn.is-spinning { animation: none; }
    }

    /* ===== 結果エリア ===== */
    .result-section[hidden] { display: none; }

    .result-section:not([hidden]) {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px 16px 16px;
      margin-bottom: 20px;
    }

    .result-summary {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 6px;
    }

    .result-label {
      font-family: var(--font-h);
      font-size: 0.85rem;
      color: var(--brown);
      letter-spacing: 0.1em;
    }

    .result-total {
      font-family: var(--font-h);
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--ink);
    }

    .result-remainder {
      font-size: 0.9rem;
      color: var(--brown);
    }

    .result-note {
      font-size: 0.72rem;
      color: #888;
      margin-bottom: 18px;
    }

    .result-body { margin-bottom: 8px; }

    .result-fade {
      animation: fadein 0.4s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .result-fade { animation: none; }
    }

    /* カテゴリグループ */
    .cat-group { margin-bottom: 18px; }

    .cat-heading {
      font-family: var(--font-h);
      font-size: 0.85rem;
      color: var(--brown);
      letter-spacing: 0.12em;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .cat-heading::before, .cat-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--brown);
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .item-row:last-child { border-bottom: none; }

    .item-name {
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .item-price {
      font-size: 0.92rem;
      font-variant-numeric: tabular-nums;
      color: var(--red);
      font-weight: 700;
      white-space: nowrap;
      padding-top: 1px;
      flex-shrink: 0;
    }

    /* エラー・空メッセージ */
    .msg-box {
      padding: 20px 16px;
      border-radius: var(--r);
      border: 1px solid var(--line);
      background: #fff;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }

    .msg-box.is-error {
      border-color: var(--red);
      color: var(--red);
    }

    /* もう一回ボタン */
    .reroll-btn {
      display: block;
      width: 100%;
      min-height: 48px;
      margin-top: 18px;
      padding: 10px 16px;
      background: transparent;
      color: var(--brown);
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-family: var(--font-b);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .reroll-btn:hover {
      border-color: var(--brown);
      background: #faf5ee;
    }

    .reroll-btn:focus-visible {
      outline: 3px solid var(--brown);
      outline-offset: 3px;
    }

    /* ===== シェアボタン ===== */
    .share-btn {
      display: block;
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
      color: #fff;
      font-family: var(--font-b);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn:active {
      opacity: 0.82;
    }

    /* ===== フィルターチップ（コントロールカード内） ===== */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border: 1.5px solid var(--line);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      color: #aaa;
      background: var(--bg);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .filter-chip:has(input:checked) {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .filter-chip input[type="checkbox"] {
      display: none;
    }

    /* ===== 結果内kcal ===== */
    .item-kcal {
      display: block;
      font-size: 0.72rem;
      color: #999;
      margin-top: 2px;
    }

    /* ===== フッター ===== */
    .footer {
      background: var(--ink);
      color: #c8bfac;
      margin-top: auto;
    }

    .footer-inner {
      padding: 16px;
      font-size: 0.75rem;
      line-height: 1.9;
    }

    /* ===== iPhone SE 対応確認 ===== */
    @media (max-width: 375px) {
      .main-inner { padding: 20px 12px 28px; }
      .gacha-btn { font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="header">
  <div class="header-inner">
    <div class="header-top">
      <img class="header-kanban"
           src="./kanban.png"
           alt="酒場ミカドヤ 看板"
           width="72"
           height="112">
      <div>
        <h1 class="header-title">ミカドガチャ</h1>
        <p class="header-sub">今夜のつまみ、ガチャが選ぶ。</p>
      </div>
    </div>
    <div class="header-noren" aria-hidden="true">
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
      <div class="noren-strip"></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="main-inner">

    <!-- コントロール（予算＋フィルター） -->
    <div class="control-card">
      <div class="budget-row" role="radiogroup" aria-label="予算選択">
        <button class="seg-btn"
                role="radio"
                aria-checked="true"
                data-budget="2000">2,000円</button>
        <button class="seg-btn"
                role="radio"
                aria-checked="false"
                data-budget="3000">3,000円</button>
      </div>
      <div class="filter-row">
        <label class="filter-chip">
          <input type="checkbox" id="filter-fast">
          <span>⚡ すぐ出る</span>
        </label>
        <label class="filter-chip">
          <input type="checkbox" id="filter-healthy">
          <span>🥗 ヘルシーメニュー</span>
        </label>
      </div>
    </div>

    <!-- ガチャボタン -->
    <section class="gacha-section">
      <button class="gacha-btn"
              id="gacha-btn"
              aria-label="2000円ガチャを引く"
              disabled>
        2,000円ガチャを引く 🎲
      </button>
    </section>

    <!-- 結果エリア -->
    <section class="result-section"
             id="result-section"
             aria-live="polite"
             aria-atomic="true"
             hidden>
    </section>

  </div>
</main>

<footer class="footer">
  <div class="footer-inner">
    <p>※価格は税込。ドリンク・お通し（チャージ）代は別途。</p>
    <p>本サービスはファンによる非公式サイトです。</p>
    <a href="./menu.html" style="display:inline-block;margin-top:8px;color:#c8bfac;font-size:0.75rem;text-underline-offset:3px;">メニューを見る →</a>
  </div>
</footer>

<script>
  'use strict';

  // ===== 状態 =====
  let menuData = null;
  let budget = 2000;
  let hasResult = false;
  let isRunning = false;
  let lastResult = null;
  let filterFast = false;
  let filterHealthy = false;
  const HEALTHY_KCAL = 300;

  // ===== DOM =====
  const gachaBtn      = document.getElementById('gacha-btn');
  const resultSection = document.getElementById('result-section');
  const segBtns       = document.querySelectorAll('.seg-btn');

  // ===== ユーティリティ =====

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function yen(n) {
    return n.toLocaleString('ja-JP') + '円';
  }

  // Fisher-Yates シャッフル
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // ===== メニュー読み込み =====
  async function loadMenu() {
    const sources = ['./menu.json', './menu.sample.json'];
    for (const src of sources) {
      try {
        const res = await fetch(src);
        if (!res.ok) continue;
        const data = await res.json();
        if (data && Array.isArray(data.categories) && Array.isArray(data.items)) {
          return data;
        }
      } catch (_) {
        // 次のフォールバックへ
      }
    }
    return null;
  }

  // ===== ガチャ対象プール構築（kind:"food" の category のみ） =====
  function buildPool(data, fast, healthy) {
    const foodIds = new Set(
      data.categories
        .filter(c => c.kind === 'food')
        .map(c => c.id)
    );
    return data.items.filter(item => {
      if (item.available === false) return false;
      if (!foodIds.has(item.category)) return false;
      if (fast    && item.speed !== 'fast') return false;
      if (healthy && (item.kcal == null || item.kcal > HEALTHY_KCAL)) return false;
      return true;
    });
  }

  // ===== ガチャアルゴリズム（§6.2） =====
  function generateOrder(pool, categories, bdg) {
    if (!pool || pool.length === 0) {
      return { items: [], total: 0, remainder: bdg, error: 'EMPTY' };
    }

    const fitting = pool.filter(i => i.price <= bdg);
    if (fitting.length === 0) {
      return { items: [], total: 0, remainder: bdg, error: 'OVER_BUDGET' };
    }

    // ステップ1: シャッフル後に貪欲追加
    const selected = [];
    const selSet   = new Set();
    let total = 0;

    for (const item of shuffle(pool)) {
      if (total + item.price <= bdg) {
        selected.push(item);
        selSet.add(item.id);
        total += item.price;
      }

      // 残額に収まる未採用品がなければ終了
      let minRemain = Infinity;
      for (const i of pool) {
        if (!selSet.has(i.id) && i.price < minRemain) minRemain = i.price;
      }
      if (bdg - total < minRemain) break;
    }

    // ステップ2: 残額詰め込み（価格降順で貪欲）
    for (;;) {
      const rem = bdg - total;
      let best = null;
      for (const item of pool) {
        if (!selSet.has(item.id) && item.price <= rem) {
          if (!best || item.price > best.price) best = item;
        }
      }
      if (!best) break;
      selected.push(best);
      selSet.add(best.id);
      total += best.price;
    }

    // ステップ3: カテゴリ偏り緩和（1カテゴリ > 80%）
    if (selected.length > 1) {
      const counts = {};
      for (const item of selected) {
        counts[item.category] = (counts[item.category] || 0) + 1;
      }
      const maxCnt = Math.max(...Object.values(counts));
      if (maxCnt / selected.length > 0.8) {
        const overCat = Object.keys(counts).find(k => counts[k] === maxCnt);
        // 偏ったカテゴリ内で最安品
        const cheapestOver = selected
          .filter(i => i.category === overCat)
          .sort((a, b) => a.price - b.price)[0];
        const spaceAfterSwap = bdg - total + cheapestOver.price;
        // 別カテゴリで price <= spaceAfterSwap の中で最高価格
        const replacement = pool
          .filter(i => !selSet.has(i.id) && i.category !== overCat && i.price <= spaceAfterSwap)
          .sort((a, b) => b.price - a.price)[0];
        if (replacement) {
          const newTotal = total - cheapestOver.price + replacement.price;
          // total が下がらない場合のみ差し替え
          if (newTotal <= bdg && newTotal >= total) {
            const idx = selected.indexOf(cheapestOver);
            selected.splice(idx, 1, replacement);
            selSet.delete(cheapestOver.id);
            selSet.add(replacement.id);
            total = newTotal;
          }
        }
      }
    }

    return {
      items: selected,
      total,
      remainder: bdg - total,
      fillRate: total / bdg
    };
  }

  // ===== 結果レンダリング =====
  function renderResult(result, categories) {
    resultSection.removeAttribute('hidden');
    resultSection.innerHTML = '';

    if (result.error === 'EMPTY') {
      resultSection.innerHTML =
        '<div class="msg-box is-error">対象の食べ物メニューがありません。</div>';
      appendRerollBtn();
      return;
    }

    if (result.error === 'OVER_BUDGET') {
      resultSection.innerHTML =
        `<div class="msg-box is-error">${yen(budget)}に収まるメニューがありません。</div>`;
      appendRerollBtn();
      return;
    }

    // サマリー（合計・残額）
    const summary = document.createElement('div');
    summary.className = 'result-summary result-fade';
    summary.innerHTML =
      `<span class="result-label">ガチャ結果</span>` +
      `<span class="result-total">合計 ${esc(yen(result.total))}</span>` +
      `<span class="result-remainder">残り ${esc(yen(result.remainder))}</span>`;
    resultSection.appendChild(summary);

    const note = document.createElement('p');
    note.className = 'result-note';
    note.textContent = '※ドリンク・お通し代別';
    resultSection.appendChild(note);

    // カテゴリ別グルーピング（order 順）
    const foodCats = categories
      .filter(c => c.kind === 'food')
      .sort((a, b) => a.order - b.order);

    const grouped = {};
    for (const item of result.items) {
      (grouped[item.category] = grouped[item.category] || []).push(item);
    }

    const body = document.createElement('div');
    body.className = 'result-body result-fade';

    for (const cat of foodCats) {
      if (!grouped[cat.id] || grouped[cat.id].length === 0) continue;

      const group = document.createElement('div');
      group.className = 'cat-group';

      const heading = document.createElement('h2');
      heading.className = 'cat-heading';
      heading.textContent = cat.label;
      group.appendChild(heading);

      for (const item of grouped[cat.id]) {
        const row = document.createElement('div');
        row.className = 'item-row';
        const kcalHtml = item.kcal != null
          ? `<small class="item-kcal">約${item.kcal}kcal</small>`
          : '';
        row.innerHTML =
          `<span class="item-name">${esc(item.name)}${kcalHtml}</span>` +
          `<span class="item-price">${esc(yen(item.price))}</span>`;
        group.appendChild(row);
      }
      body.appendChild(group);
    }

    resultSection.appendChild(body);
    lastResult = result;
    appendRerollBtn();
    appendShareBtn();
  }

  function appendRerollBtn() {
    const btn = document.createElement('button');
    btn.className = 'reroll-btn';
    btn.textContent = 'もう一回引く 🎲';
    btn.addEventListener('click', runGacha);
    resultSection.appendChild(btn);
  }

  function appendShareBtn() {
    const btn = document.createElement('button');
    btn.className = 'share-btn';
    btn.textContent = 'ストーリーズでシェア 📸';
    btn.addEventListener('click', handleShare);
    resultSection.appendChild(btn);
  }

  // ===== シェア =====
  async function handleShare() {
    if (!lastResult || !menuData) return;
    const canvas = buildShareCanvas(lastResult, menuData.categories, budget);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'mikadoya-gacha.png', { type: 'image/png' });
      if (navigator.share) {
        const canShare = !navigator.canShare || navigator.canShare({ files: [file] });
        if (canShare) {
          try {
            await navigator.share({ files: [file], title: 'ミカドガチャ' });
            return;
          } catch (e) {
            if (e.name === 'AbortError') return;
          }
        }
      }
      fallbackDownload(canvas);
    }, 'image/png');
  }

  function fallbackDownload(canvas) {
    const a = document.createElement('a');
    a.download = 'mikadoya-gacha.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  function buildShareCanvas(result, categories, bdg) {
    const W = 1080;
    const PAD = 64;
    const RED = '#c0392b';
    const RED_DARK = '#8c2820';
    const INK = '#1a1a1a';
    const BG = '#f6f0e4';
    const GREEN = '#5a7a3a';
    const LINE_C = '#d9cfc2';

    const HEADER_H = 300;
    const SUMMARY_H = 190;
    const CAT_H = 62;
    const ITEM_H = 56;
    const CAT_GAP = 24;
    const PROMO_H = 160;
    const FOOTER_H = 140;

    const foodCats = categories
      .filter(c => c.kind === 'food')
      .sort((a, b) => a.order - b.order);
    const grouped = {};
    for (const item of result.items) {
      (grouped[item.category] = grouped[item.category] || []).push(item);
    }
    const usedCats = foodCats.filter(c => grouped[c.id]?.length > 0);

    let itemsH = PAD;
    for (const cat of usedCats) {
      itemsH += CAT_H + grouped[cat.id].length * ITEM_H + CAT_GAP;
    }
    itemsH += PAD;

    const H = Math.max(1920, HEADER_H + SUMMARY_H + itemsH + PROMO_H + FOOTER_H);

    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // ── Header ──
    ctx.fillStyle = RED;
    ctx.fillRect(0, 0, W, HEADER_H);

    // Noren strips
    const nW = W / 8;
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = i % 2 === 0 ? RED_DARK : RED;
      ctx.fillRect(i * nW, HEADER_H - 48, nW, 48);
    }

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 88px serif';
    ctx.fillText('ミカドヤ', W / 2, 130);

    ctx.font = '40px serif';
    ctx.globalAlpha = 0.88;
    ctx.fillText('ミカドガチャ', W / 2, 210);
    ctx.globalAlpha = 1;

    // ── Summary ──
    let y = HEADER_H;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, y, W, SUMMARY_H);

    ctx.fillStyle = INK;
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px sans-serif';
    ctx.fillText('合計 ' + yen(result.total), W / 2, y + 76);

    ctx.font = '38px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('残り ' + yen(result.remainder), W / 2, y + 130);

    ctx.font = '30px sans-serif';
    ctx.fillStyle = '#999';
    ctx.fillText('※ドリンク・お通し代別', W / 2, y + 172);

    y += SUMMARY_H;

    // ── Items ──
    ctx.fillStyle = BG;
    ctx.fillRect(0, y, W, itemsH);

    y += PAD;

    for (const cat of usedCats) {
      // Category label
      ctx.fillStyle = GREEN;
      ctx.textAlign = 'left';
      ctx.font = 'bold 38px serif';
      ctx.fillText(cat.label, PAD, y + 42);

      ctx.strokeStyle = GREEN;
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(PAD, y + 52);
      ctx.lineTo(W - PAD, y + 52);
      ctx.stroke();

      y += CAT_H;

      for (const item of grouped[cat.id]) {
        // Dotted divider
        ctx.setLineDash([5, 8]);
        ctx.strokeStyle = LINE_C;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(PAD, y + 2);
        ctx.lineTo(W - PAD, y + 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Item name (truncate if needed)
        ctx.fillStyle = INK;
        ctx.textAlign = 'left';
        ctx.font = '34px sans-serif';
        const priceW = ctx.measureText('10,000円').width + 16;
        let name = item.name;
        while (ctx.measureText(name).width > W - PAD * 2 - priceW) {
          name = name.slice(0, -1);
        }
        if (name !== item.name) name += '…';
        ctx.fillText(name, PAD, y + 40);

        // Price
        ctx.fillStyle = RED;
        ctx.textAlign = 'right';
        ctx.font = 'bold 34px sans-serif';
        ctx.fillText(yen(item.price), W - PAD, y + 40);

        y += ITEM_H;
      }

      y += CAT_GAP;
    }

    y += PAD;

    // ── Promo ──
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, y, W, PROMO_H);

    ctx.fillStyle = INK;
    ctx.textAlign = 'center';
    ctx.font = '30px sans-serif';
    ctx.fillText('あなたも引いてみる →', W / 2, y + 64);

    ctx.fillStyle = RED;
    ctx.font = '700 26px monospace';
    ctx.fillText('doingkid.github.io/mikadoya-gacha', W / 2, y + 108);

    y += PROMO_H;

    // ── Footer (fills rest) ──
    ctx.fillStyle = INK;
    ctx.fillRect(0, y, W, H - y);

    ctx.fillStyle = '#c8bfac';
    ctx.textAlign = 'center';
    ctx.font = '30px sans-serif';
    ctx.fillText('酒場ミカドヤ  静岡県三島市', W / 2, y + 64);
    ctx.font = '26px sans-serif';
    ctx.fillStyle = '#8a8070';
    ctx.fillText('価格は税込。ドリンク・お通し代別。', W / 2, y + 108);

    return canvas;
  }

  // ===== ガチャ実行 =====
  async function runGacha() {
    if (isRunning || !menuData) return;
    isRunning = true;

    gachaBtn.disabled = true;
    gachaBtn.classList.remove('is-spinning');
    // 一フレーム後にクラス追加（再実行時もアニメが動くように）
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        gachaBtn.classList.add('is-spinning');
      });
    });

    await new Promise(r => setTimeout(r, 400));

    const pool   = buildPool(menuData, filterFast, filterHealthy);
    const result = generateOrder(pool, menuData.categories, budget);
    renderResult(result, menuData.categories);
    hasResult = true;

    gachaBtn.classList.remove('is-spinning');
    gachaBtn.disabled = false;
    isRunning = false;
  }

  // ===== 予算切り替え =====
  function setBudget(newBudget) {
    budget = newBudget;

    segBtns.forEach(btn => {
      const selected = Number(btn.dataset.budget) === budget;
      btn.setAttribute('aria-checked', selected ? 'true' : 'false');
    });

    const label = budget.toLocaleString('ja-JP');
    gachaBtn.textContent = `${label}円ガチャを引く 🎲`;
    gachaBtn.setAttribute('aria-label', `${label}円ガチャを引く`);

    if (hasResult && menuData && !isRunning) runGacha();
  }

  segBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const val = Number(btn.dataset.budget);
      if (val !== budget) setBudget(val);
    });
  });

  gachaBtn.addEventListener('click', runGacha);

  document.getElementById('filter-fast').addEventListener('change', e => {
    filterFast = e.target.checked;
    if (hasResult && menuData && !isRunning) runGacha();
  });

  document.getElementById('filter-healthy').addEventListener('change', e => {
    filterHealthy = e.target.checked;
    if (hasResult && menuData && !isRunning) runGacha();
  });

  // ===== 初期化 =====
  async function init() {
    const data = await loadMenu();
    if (!data) {
      resultSection.removeAttribute('hidden');
      resultSection.innerHTML =
        '<div class="msg-box is-error">' +
        'メニューデータの読み込みに失敗しました。<br>' +
        'ページを再読み込みしてください。' +
        '</div>';
      return;
    }
    menuData = data;
    gachaBtn.disabled = false;
  }

  init();
</script>
